<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; script-src 'unsafe-inline'; form-action https://formspree.io 'self'; img-src 'self' data:; base-uri 'self'; object-src 'none'; frame-ancestors 'none'">

<title>AP Estates — Nieruchomości w Tajlandii</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#1b1f1d;
    --ink-soft:#5c645f;
    --line:#e6e3dc;
    --bg:#fdfcfa;
    --bg-alt:#f6f4ef;
    --accent:#1e4d3f;
    --accent-soft:#eaf0ea;
    --sand:#c9b491;
    --radius:2px;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html{scroll-behavior:smooth}
  body{font-family:'Inter',sans-serif;font-weight:300;color:var(--ink);background:var(--bg);line-height:1.7;font-size:16px}
  h1,h2,h3{font-family:'Fraunces',serif;font-weight:400;line-height:1.15}
  img{max-width:100%;display:block}
  a{color:inherit;text-decoration:none}
  .wrap{max-width:1180px;margin:0 auto;padding:0 32px}
  .label{font-size:11px;letter-spacing:.28em;text-transform:uppercase;color:var(--accent);font-weight:500;margin-bottom:20px;display:block}
  section{padding:110px 0}
  .btn{display:inline-block;padding:16px 36px;font-size:13px;letter-spacing:.14em;text-transform:uppercase;font-weight:500;border-radius:var(--radius);transition:all .25s ease;cursor:pointer;border:1px solid var(--ink)}
  .btn-dark{background:var(--ink);color:#fff}
  .btn-dark:hover{background:var(--accent);border-color:var(--accent)}
  .btn-ghost{background:transparent;color:var(--ink)}
  .btn-ghost:hover{background:var(--ink);color:#fff}

  /* NAV */
  nav{position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(253,252,250,.88);backdrop-filter:blur(12px);border-bottom:1px solid var(--line)}
  .nav-inner{display:flex;align-items:center;justify-content:space-between;height:72px}
  .logo{font-family:'Fraunces',serif;font-size:21px;letter-spacing:.06em}
  .logo span{color:var(--accent)}
  .nav-links{display:flex;gap:36px;align-items:center;font-size:13px;letter-spacing:.06em}
  .nav-links a:not(.btn){color:var(--ink-soft);transition:color .2s}
  .nav-links a:not(.btn):hover{color:var(--ink)}
  .nav-links .btn{padding:10px 22px;font-size:11px}
  .lang-switch{display:flex;gap:2px;border:1px solid var(--line);border-radius:var(--radius);overflow:hidden}
  .lang-switch button{border:0;background:transparent;padding:7px 12px;font-size:11px;letter-spacing:.1em;cursor:pointer;color:var(--ink-soft);font-family:'Inter',sans-serif}
  .lang-switch button.active{background:var(--ink);color:#fff}
  .burger{display:none;background:none;border:0;font-size:24px;cursor:pointer}

  /* HERO */
  .hero{padding:200px 0 0;background:var(--bg)}
  .hero h1{font-size:clamp(42px,6vw,76px);max-width:900px;letter-spacing:-.01em}
  .hero h1 em{font-style:italic;color:var(--accent)}
  .hero p.lead{max-width:560px;margin:32px 0 44px;font-size:18px;color:var(--ink-soft)}
  .hero-cta{display:flex;gap:16px;flex-wrap:wrap;margin-bottom:90px}
  .hero-visual{height:420px;background:linear-gradient(135deg,#dfe7df 0%,#cfc3ab 55%,#b7c4bb 100%);border-radius:var(--radius);display:flex;align-items:flex-end;padding:28px;position:relative;overflow:hidden}
  .hero-visual::after{content:"";position:absolute;inset:0;background:radial-gradient(ellipse at 70% 20%,rgba(255,255,255,.5),transparent 60%)}
  .hero-visual small{position:relative;z-index:1;font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:rgba(27,31,29,.55)}
  .stats{display:grid;grid-template-columns:repeat(4,1fr);border-top:1px solid var(--line);margin-top:0}
  .stat{padding:44px 24px 44px 0}
  .stat + .stat{border-left:1px solid var(--line);padding-left:32px}
  .stat b{font-family:'Fraunces',serif;font-weight:400;font-size:38px;display:block;margin-bottom:6px}
  .stat span{font-size:13px;color:var(--ink-soft)}

  /* WHY THAILAND */
  .why{background:var(--bg-alt)}
  .sec-head{display:grid;grid-template-columns:1fr 1fr;gap:60px;margin-bottom:70px;align-items:end}
  .sec-head h2{font-size:clamp(30px,3.6vw,46px)}
  .sec-head p{color:var(--ink-soft);max-width:460px}
  .grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--line);border:1px solid var(--line)}
  .cell{background:var(--bg);padding:40px 30px}
  .cell h3{font-size:20px;margin-bottom:14px}
  .cell p{font-size:14px;color:var(--ink-soft)}
  .cell .num{font-family:'Fraunces',serif;font-size:15px;color:var(--sand);display:block;margin-bottom:22px}

  /* SEGMENTS */
  .grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:28px}
  .seg{border:1px solid var(--line);border-radius:var(--radius);padding:44px 36px;transition:all .25s;background:var(--bg)}
  .seg:hover{border-color:var(--accent);transform:translateY(-4px)}
  .seg h3{font-size:24px;margin:0 0 16px}
  .seg p{font-size:14.5px;color:var(--ink-soft);margin-bottom:24px}
  .seg ul{list-style:none;font-size:13.5px}
  .seg li{padding:9px 0;border-top:1px solid var(--line);color:var(--ink-soft)}
  .seg li::before{content:"—";color:var(--accent);margin-right:10px}

  /* PROCESS */
  .process{background:var(--ink);color:#f4f2ed}
  .process .label{color:var(--sand)}
  .process h2{font-size:clamp(30px,3.6vw,46px);margin-bottom:70px;max-width:640px}
  .steps{display:grid;grid-template-columns:repeat(5,1fr);gap:32px}
  .step{border-top:1px solid rgba(244,242,237,.25);padding-top:26px}
  .step b{font-family:'Fraunces',serif;font-weight:300;font-size:15px;color:var(--sand);display:block;margin-bottom:16px}
  .step h3{font-size:18px;margin-bottom:12px;color:#fff}
  .step p{font-size:13.5px;color:rgba(244,242,237,.65);overflow-wrap:break-word;padding-right:6px}

  /* TRUST */
  .trust-grid{display:grid;grid-template-columns:1fr 1fr;gap:80px;align-items:start}
  .trust-visual{height:520px;background:linear-gradient(160deg,#e8e4da,#cdd6cd);border-radius:var(--radius);display:flex;align-items:flex-end;padding:28px}
  .trust-visual small{font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:rgba(27,31,29,.5)}
  .trust h2{font-size:clamp(30px,3.4vw,42px);margin-bottom:28px}
  .trust-points{margin-top:40px}
  .tp{padding:24px 0;border-top:1px solid var(--line)}
  .tp h3{font-size:18px;margin-bottom:8px}
  .tp p{font-size:14.5px;color:var(--ink-soft)}
  .founder{margin-top:44px;padding:28px;background:var(--bg-alt);border-radius:var(--radius);font-size:14.5px;color:var(--ink-soft)}
  .founder b{display:block;font-family:'Fraunces',serif;font-weight:400;font-size:17px;color:var(--ink);margin-top:14px}

  /* FAQ */
  .faq{background:var(--bg-alt)}
  .faq-list{max-width:820px;margin:0 auto}
  .faq h2{text-align:center;font-size:clamp(30px,3.4vw,42px);margin-bottom:60px}
  details{border-top:1px solid var(--line);padding:26px 8px}
  details:last-child{border-bottom:1px solid var(--line)}
  summary{cursor:pointer;font-size:17px;font-weight:400;font-family:'Fraunces',serif;list-style:none;display:flex;justify-content:space-between;align-items:center}
  summary::-webkit-details-marker{display:none}
  summary::after{content:"+";font-size:22px;color:var(--accent);font-family:'Inter',sans-serif;font-weight:300}
  details[open] summary::after{content:"–"}
  details p{margin-top:16px;font-size:14.5px;color:var(--ink-soft);max-width:680px}

  /* FORM */
  .contact{padding:110px 0 130px}
  .contact-grid{display:grid;grid-template-columns:1fr 1.1fr;gap:80px}
  .contact h2{font-size:clamp(32px,3.8vw,48px);margin-bottom:24px}
  .contact .sub{color:var(--ink-soft);max-width:420px;margin-bottom:36px}
  .contact-meta{font-size:14px;color:var(--ink-soft);line-height:2.2}
  .contact-meta b{color:var(--ink);font-weight:500}
  form{display:grid;grid-template-columns:1fr 1fr;gap:18px}
  .full{grid-column:1/-1}
  label.f{font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--ink-soft);display:block;margin-bottom:8px}
  input,select,textarea{width:100%;padding:14px 16px;border:1px solid var(--line);border-radius:var(--radius);font-family:'Inter',sans-serif;font-size:15px;font-weight:300;background:#fff;color:var(--ink);transition:border-color .2s}
  input:focus,select:focus,textarea:focus{outline:none;border-color:var(--accent)}
  textarea{min-height:110px;resize:vertical}
  .rodo{display:flex;gap:12px;align-items:flex-start;font-size:12px;color:var(--ink-soft)}
  .rodo input{width:auto;margin-top:3px}
  .form-note{font-size:12px;color:var(--ink-soft);margin-top:10px}
  .success{display:none;padding:22px;background:var(--accent-soft);border:1px solid var(--accent);border-radius:var(--radius);color:var(--accent);font-size:15px;grid-column:1/-1}

  /* FOOTER */
  footer{border-top:1px solid var(--line);padding:56px 0;font-size:13px;color:var(--ink-soft)}
  .foot{display:flex;justify-content:space-between;gap:32px;flex-wrap:wrap}
  .disclaimer{margin-top:28px;font-size:11.5px;max-width:760px;line-height:1.8;color:#9aa19c}

  /* RESPONSIVE */
  @media(max-width:960px){
    section{padding:80px 0}
    .grid-4,.steps{grid-template-columns:repeat(2,1fr)}
    .grid-3{grid-template-columns:1fr}
    .sec-head,.trust-grid,.contact-grid{grid-template-columns:1fr;gap:40px}
    .stats{grid-template-columns:repeat(2,1fr)}
    .stat+.stat{border-left:0;padding-left:0}
    .stat:nth-child(even){border-left:1px solid var(--line);padding-left:24px}
    .trust-visual{height:320px}
    .nav-links{display:none;position:absolute;top:72px;left:0;right:0;background:var(--bg);flex-direction:column;padding:28px;gap:22px;border-bottom:1px solid var(--line)}
    .nav-links.open{display:flex}
    .burger{display:block}
    .hero{padding-top:150px}
  }
  @media(max-width:560px){
    .grid-4,.steps,form{grid-template-columns:1fr}
    .stats{grid-template-columns:1fr}
    .stat:nth-child(even){border-left:0;padding-left:0}
    .stat+.stat{border-top:1px solid var(--line)}
  }
</style>
</head>

let lang = 'pl';
function setLang(l){
  lang = l;
  document.documentElement.lang = l;
  document.getElementById('btn-pl').classList.toggle('active', l==='pl');
  document.getElementById('btn-en').classList.toggle('active', l==='en');
  document.querySelectorAll('[data-i18n]').forEach(el=>{ el.textContent = T[l][el.dataset.i18n] ?? el.textContent; });
  document.querySelectorAll('[data-i18n-html]').forEach(el=>{ el.innerHTML = T[l][el.dataset.i18nHtml] ?? el.innerHTML; });
}
setLang('pl');

function handleSubmit(e){
  const form = e.target;
  if(form.action.includes('YOUR_FORM_ID')){
    e.preventDefault();
    document.getElementById('success').style.display='block';
    form.querySelectorAll('input,select,textarea,button').forEach(x=>x.disabled=true);
    return false;
  }
  return true; // z prawdziwym Formspree ID formularz wysyła się normalnie
}
